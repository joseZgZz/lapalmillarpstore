<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>La Palmilla RP Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: none;
        }

        :root {
            --primary: #ff2e2e;
            --secondary: #ffd000;
        }

        .glass {
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glass-dark {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(30px);
        }

        .bg-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, rgba(255, 46, 46, 0.025) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 46, 46, 0.025) 1px, transparent 1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            font-weight: 900;
            transition: all .2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover {
            background: #cc2020;
            transform: scale(1.02);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: var(--secondary);
            color: #000;
            font-weight: 900;
            transition: all .2s;
            cursor: pointer;
            border: none;
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        .inp {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            transition: border .2s;
        }

        .inp:focus {
            border-color: var(--primary);
        }

        .inp::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .card {
            transition: all .3s cubic-bezier(.4, 0, .2, 1);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 46, 46, 0.3) !important;
            background: rgba(255, 46, 46, 0.04) !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(.96)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        @keyframes marquee {
            0% {
                transform: translateX(0)
            }

            100% {
                transform: translateX(-50%)
            }
        }

        .animate-in {
            animation: fadeIn .25s ease-out forwards;
        }

        .animate-marquee {
            animation: marquee 40s linear infinite;
        }

        .animate-marquee:hover {
            animation-play-state: paused;
        }

        .scrollbar::-webkit-scrollbar {
            width: 3px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 46, 46, 0.3);
            border-radius: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: .05em;
            cursor: pointer;
            border: none;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 8px 20px -4px rgba(255, 46, 46, 0.4);
        }

        .tab-btn:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
        }

        .tab-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        select.inp option {
            background: #111;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        // ===== ICONS SVG =====
        const ICONS = {
            home: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
            store: '<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>',
            bell: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
            briefcase: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>',
            user: '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',
            settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>',
            x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
            cart: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>',
            coins: '<circle cx="12" cy="12" r="8"/><line x1="12" y1="8" x2="12" y2="16"/><path d="M8 12h8"/>',
            trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/>',
            plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
            shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
            heart: '<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>',
            wrench: '<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.77 3.77z"/>',
            zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
            package: '<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
            history: '<polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 109.88-7.98"/>',
            logout: '<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
            check: '<polyline points="20 6 9 11 4 16"/>',
            users: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
        };

        function icon(name, size = 18, cls = '') {
            const d = ICONS[name] || ICONS.package;
            return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${cls}">${d}</svg>`;
        }

        // ===== STATE =====
        let STATE = {
            visible: false, tab: 'home', storeCategory: 'Todas',
            products: [], categories: [], businesses: [], announcements: [],
            coins: 0, isAdmin: false, profile: {}, myPurchases: [], recentPurchases: [],
            notification: null,
            // admin forms
            adminTab: 'products',
            prodForm: { name: '', description: '', price: '', item: '', image: '', category: '' },
            annForm: { title: '', content: '', category: 'Update' },
            catForm: { name: '', icon: 'Package' },
            coinsForm: { targetId: '', amount: '', action: 'add' },
        };

        // ===== HELPERS =====
        const rp = (resource, cb, data = {}) => fetch(`https://${resource}/${cb}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const nui = (cb, data = {}) => rp(GetParentResourceName ? GetParentResourceName() : 'qb-store', cb, data);
        const fmtTime = (d) => { const s = Math.floor((Date.now() - new Date(d)) / 1000); if (s < 60) return s + 's'; if (s < 3600) return Math.floor(s / 60) + 'm'; if (s < 86400) return Math.floor(s / 3600) + 'h'; return Math.floor(s / 86400) + 'd'; };

        function showNotif(msg, type = 'success') {
            STATE.notification = { msg, type };
            render();
            setTimeout(() => { STATE.notification = null; render(); }, 3500);
        }

        // ===== RENDER ENGINE =====
        function $(sel) { return document.querySelector(sel); }
        function render() { document.getElementById('root').innerHTML = buildApp(); bindEvents(); }

        // ===== TICKER =====
        function buildTicker() {
            if (!STATE.recentPurchases.length) return '';
            const items = [...STATE.recentPurchases, ...STATE.recentPurchases, ...STATE.recentPurchases]
                .map(p => `<span class="flex items-center gap-2 px-8 border-r border-white/5">
      ${icon('cart', 13, 'text-yellow-400 animate-pulse')}
      <span class="text-[10px] font-black text-white uppercase italic">${escHtml(p.username)}</span>
      <span class="text-[10px] text-gray-500">compró</span>
      <span class="text-[10px] font-black text-red-400 uppercase">${escHtml(p.product_name)}</span>
      <span class="text-[10px] text-gray-600 bg-white/5 px-2 rounded-full">hace ${fmtTime(p.date)}</span>
    </span>`).join('');
            return `<div class="absolute top-0 left-0 right-0 h-9 bg-red-500/10 backdrop-blur border-b border-white/5 flex items-center overflow-hidden z-50">
    <div class="whitespace-nowrap flex animate-marquee">${items}</div>
  </div>`;
        }

        function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ===== SIDEBAR =====
        function buildSidebar() {
            const tabs = [
                { id: 'home', label: 'Inicio', ic: 'home' },
                { id: 'store', label: 'Tienda', ic: 'store' },
                { id: 'news', label: 'Noticias', ic: 'bell' },
                { id: 'businesses', label: 'Negocios', ic: 'briefcase' },
                { id: 'profile', label: 'Mi Perfil', ic: 'user' },
            ];
            if (STATE.isAdmin) tabs.push({ id: 'admin', label: 'Admin', ic: 'settings', special: true });

            return `<div class="w-52 flex-shrink-0 flex flex-col gap-1.5 py-2">
    ${tabs.map(t => `
      <button data-tab="${t.id}" class="tab-btn ${STATE.tab === t.id ? 'active' : ''} ${t.special ? 'mt-8 border border-red-500/30' : ''}" style="${t.special && STATE.tab !== t.id ? 'background:rgba(255,46,46,0.08);color:#ff2e2e;' : ''}">
        ${icon(t.ic, 16)} ${t.label}
      </button>`).join('')}
  </div>`;
        }

        // ===== HOME =====
        function buildHome() {
            const featured = STATE.products.slice(0, 4);
            const openBiz = STATE.businesses.filter(b => b.status == 1);
            return `<div class="flex flex-col gap-10 h-full overflow-y-auto scrollbar pr-2 pb-4">
    <!-- Hero -->
    <div class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-red-500/10 to-black/60 border border-white/5 p-10 text-center">
      <div class="absolute top-0 right-0 w-64 h-64 bg-red-500/20 blur-[100px] pointer-events-none"></div>
      <div class="relative z-10">
        <div class="inline-flex items-center gap-2 px-5 py-1.5 bg-white/5 rounded-full border border-white/10 mb-5">
          ${icon('zap', 14, 'text-yellow-400 animate-pulse')}
          <span class="text-[10px] font-black text-white uppercase tracking-widest">Official Server Store</span>
        </div>
        <h1 class="text-5xl font-black text-white tracking-tighter uppercase mb-3">LA PALMILLA <span class="text-red-400 italic">RP</span></h1>
        <p class="text-gray-400 font-medium mb-8 max-w-lg mx-auto text-sm">Mejora tu experiencia con kits VIP, vehículos exclusivos y recursos premium.</p>
        <div class="flex justify-center gap-4">
          <button data-tab-go="store" class="btn-primary px-8 py-3 rounded-xl text-sm flex items-center gap-2">
            ${icon('cart', 16)} IR A LA TIENDA
          </button>
        </div>
      </div>
    </div>
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4">
      ${[['2.500+', 'Usuarios Activos', 'text-red-400'], ['1.200+', 'Ventas Totales', 'text-yellow-400'], ['24/7', 'Monitorización', 'text-blue-400']].map(([n, l, c]) => `
      <div class="glass rounded-2xl p-5 text-center">
        <p class="text-3xl font-black text-white mb-1">${n}</p>
        <p class="text-[10px] font-black uppercase tracking-widest ${c}">${l}</p>
      </div>`).join('')}
    </div>
    <!-- Open Businesses -->
    ${openBiz.length ? `<div>
      <div class="flex items-center gap-3 mb-5">
        ${icon('briefcase', 20, 'text-yellow-400')}
        <div>
          <h2 class="text-lg font-black text-white uppercase tracking-tight">Servicios <span class="text-yellow-400">Activos</span></h2>
          <p class="text-gray-500 text-xs">Negocios abiertos ahora mismo</p>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        ${openBiz.map(b => `<div class="glass rounded-2xl p-4 border border-yellow-500/10 bg-yellow-500/5 flex items-center gap-4">
          <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center text-green-500">${icon(getBizIcon(b.icon), 20)}</div>
          <div>
            <p class="font-black text-white text-sm">${escHtml(b.name)}</p>
            <div class="flex items-center gap-1.5 mt-0.5">
              <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
              <span class="text-[10px] font-bold text-green-500 uppercase">ABIERTO</span>
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`: ``}
    <!-- Featured Products -->
    <div>
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-black text-white uppercase tracking-tight">Lo más buscado</h2>
        <button data-tab-go="store" class="text-gray-500 hover:text-red-400 text-xs font-bold flex items-center gap-1">Ver todo →</button>
      </div>
      <div class="grid grid-cols-2 gap-4">
        ${featured.map(p => `<div class="glass rounded-2xl overflow-hidden card border border-white/5 cursor-pointer" data-buy="${p.id}" data-price="${p.price}">
          <div class="relative h-32 overflow-hidden">
            <img src="${escHtml(p.image || '')}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/></svg>'"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
            <div class="absolute top-2 left-2 bg-red-500 text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase">HOT</div>
          </div>
          <div class="p-4">
            <p class="font-black text-white text-sm mb-1">${escHtml(p.name)}</p>
            <div class="flex items-center justify-between">
              <span class="text-yellow-400 font-black">${p.price} <span class="text-gray-500 font-bold text-xs">CC</span></span>
              <div class="p-1.5 bg-white/5 rounded-lg">${icon('cart', 14, 'text-gray-400')}</div>
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>
    <!-- Info Blocks -->
    <div class="grid grid-cols-3 gap-4">
      ${[['zap', 'Entrega Instantánea', 'Recibes tus compras automáticamente en el servidor.', 'text-red-400', 'bg-red-500/10'],
                ['shield', 'Pagos Seguros', 'Tu dinero siempre protegido con nuestro sistema.', 'text-yellow-400', 'bg-yellow-500/10'],
                ['users', 'Soporte 24/7', 'Únete al Discord para soporte inmediato.', 'text-blue-400', 'bg-blue-500/10']
                ].map(([ic, t, d, c, bg]) => `
      <div class="glass rounded-2xl p-5 text-center">
        <div class="w-10 h-10 ${bg} rounded-xl flex items-center justify-center ${c} mx-auto mb-3">${icon(ic, 20)}</div>
        <p class="font-black text-white text-sm mb-1 uppercase">${t}</p>
        <p class="text-gray-500 text-xs">${d}</p>
      </div>`).join('')}
    </div>
  </div>`;
        }

        // ===== STORE =====
        function buildStore() {
            const cats = ['Todas', ...STATE.categories.map(c => c.name)];
            const filtered = STATE.storeCategory === 'Todas' ? STATE.products : STATE.products.filter(p => p.category === STATE.storeCategory);
            return `<div class="flex flex-col h-full overflow-hidden">
    <div class="flex gap-2 mb-5 overflow-x-auto pb-1 scrollbar flex-shrink-0">
      ${cats.map(c => `<button data-cat="${c}" class="px-4 py-2 rounded-xl font-black text-[11px] uppercase tracking-wide whitespace-nowrap cursor-pointer border-none transition-all
        ${STATE.storeCategory === c ? 'bg-white text-black' : 'bg-white/5 text-white/40 hover:bg-white/10 hover:text-white'}">${c}</button>`).join('')}
    </div>
    <div class="grid grid-cols-3 gap-4 overflow-y-auto scrollbar pr-1">
      ${filtered.length ? filtered.map(p => `
        <div class="glass rounded-2xl overflow-hidden card border border-white/5">
          <div class="relative h-36 overflow-hidden">
            <img src="${escHtml(p.image || '')}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/></svg>'"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
            <div class="absolute top-2 right-2 bg-black/80 backdrop-blur px-2.5 py-1 rounded-full border border-white/10 flex items-center gap-1.5">
              ${icon('coins', 12, 'text-yellow-400')}
              <span class="text-white font-black text-xs">${p.price}</span>
            </div>
          </div>
          <div class="p-4">
            <p class="font-black text-white text-sm mb-1">${escHtml(p.name)}</p>
            <p class="text-gray-500 text-[11px] mb-3 line-clamp-2">${escHtml(p.description || '')}</p>
            <button data-buy="${p.id}" data-price="${p.price}" class="btn-primary w-full rounded-xl py-2.5 text-[11px] tracking-widest flex items-center justify-center gap-2">
              ${icon('cart', 14)} COMPRAR
            </button>
          </div>
        </div>`).join('') : `<div class="col-span-3 text-center py-20 text-gray-600">
          ${icon('package', 48, 'mx-auto mb-4 opacity-20')}
          <p class="font-bold uppercase tracking-widest text-sm opacity-40">Sin productos en esta categoría</p>
        </div>`}
    </div>
  </div>`;
        }

        // ===== NEWS =====
        function buildNews() {
            return `<div class="flex flex-col h-full overflow-hidden">
    <div class="flex items-center gap-3 mb-6 flex-shrink-0">
      <div class="w-10 h-10 bg-red-500/10 rounded-xl flex items-center justify-center text-red-400">${icon('bell', 20)}</div>
      <div>
        <h2 class="text-lg font-black text-white uppercase tracking-tight">Últimas <span class="text-red-400">Novedades</span></h2>
        <p class="text-gray-500 text-xs">Actualizaciones, eventos y cambios del servidor</p>
      </div>
    </div>
    <div class="flex flex-col gap-4 overflow-y-auto scrollbar pr-1">
      ${STATE.announcements.length ? STATE.announcements.map(a => {
                const cat = a.category || 'Update';
                const catColor = cat === 'Alert' ? 'text-red-400 bg-red-500/10' : cat === 'Event' ? 'text-yellow-400 bg-yellow-500/10' : 'text-blue-400 bg-blue-500/10';
                const ic = cat === 'Alert' ? 'shield' : cat === 'Event' ? 'zap' : 'bell';
                return `<div class="glass rounded-2xl p-5 border border-white/5 flex gap-5 items-start">
          <div class="w-12 h-12 ${catColor.split(' ')[1]} rounded-xl flex items-center justify-center ${catColor.split(' ')[0]} flex-shrink-0">${icon(ic, 22)}</div>
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">${new Date(a.date).toLocaleDateString('es-ES')}</span>
              <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase text-white ${cat === 'Alert' ? 'bg-red-500' : cat === 'Event' ? 'bg-yellow-500' : 'bg-blue-500'}">${cat}</span>
            </div>
            <h3 class="font-black text-white text-sm mb-1 uppercase">${escHtml(a.title)}</h3>
            <p class="text-gray-400 text-xs leading-relaxed">${escHtml(a.content)}</p>
          </div>
          ${STATE.isAdmin ? `<button data-del-ann="${a.id}" class="text-gray-600 hover:text-red-400 transition-colors flex-shrink-0">${icon('trash', 16)}</button>` : ``}
        </div>`;
            }).join('') : `<div class="text-center py-20 opacity-30">

        // ===== NOTIFICATION =====
        function buildNotif() {
            if (!STATE.notification) return '';
            const { msg, type } = STATE.notification;
            const styles = type === 'error' ? 'bg-red-500/20 border-red-500/30 text-red-400' : type === 'success' ? 'bg-green-500/20 border-green-500/30 text-green-400' : 'bg-blue-500/20 border-blue-500/30 text-blue-400';
            const ic = type === 'error' ? 'x' : type === 'success' ? 'check' : 'bell';
            return `<div class="fixed top-12 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-2xl border ${styles} backdrop-blur-xl animate-in">
    ${icon(ic, 16)} <span class="font-black text-sm">${escHtml(msg)}</span>
  </div>`;
        }

        // ===== MAIN APP =====
        function buildApp() {
            if (!STATE.visible) return '';
            const contentMap = { home: buildHome, store: buildStore, news: buildNews, businesses: buildBusinesses, profile: buildProfile, admin: buildAdmin };
            const content = (contentMap[STATE.tab] || buildHome)();

            return `
  ${buildNotif()}
  <div class="w-screen h-screen glass-dark bg-grid flex overflow-hidden relative animate-in">
    ${buildTicker()}
    <div class="flex flex-col w-full h-full pt-9 px-6 pb-6">
      <!-- Header -->
      <div class="flex items-center justify-between py-4 mb-4 flex-shrink-0 border-b border-white/5">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-red-500 rounded-xl flex items-center justify-center">${icon('store', 18, 'text-white')}</div>
          <div>
            <h1 class="text-base font-black text-white uppercase tracking-tight leading-none">La Palmilla <span class="text-red-400 italic">RP</span></h1>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Official Store Dashboard</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-xl border border-white/5">
            ${icon('coins', 15, 'text-yellow-400')}
            <span id="coins-display" class="text-sm font-black text-white">${STATE.coins}</span>
            <span class="text-[9px] text-gray-500 font-bold">CC</span>
          </div>
          <button id="btn-close" class="w-8 h-8 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 text-gray-500 hover:text-white transition-all border-none cursor-pointer">
            ${icon('x', 16)}
          </button>
        </div>
      </div>
      <!-- Body -->
      <div class="flex flex-1 gap-6 overflow-hidden">
        ${buildSidebar()}
        <div class="flex-1 overflow-hidden">
          ${content}
        </div>
      </div>
    </div>
  </div>`;
        }

        // ===== EVENT BINDING =====
        function bindEvents() {
            // Close
            const bc = document.getElementById('btn-close');
            if (bc) bc.addEventListener('click', () => { nui('close'); STATE.visible = false; render(); document.body.style.display = 'none'; });

            // Tabs - sidebar
            document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => { STATE.tab = el.dataset.tab; render(); }));
            document.querySelectorAll('[data-tab-go]').forEach(el => el.addEventListener('click', () => { STATE.tab = el.dataset.tabGo; render(); }));

            // Store categories
            document.querySelectorAll('[data-cat]').forEach(el => el.addEventListener('click', () => { STATE.storeCategory = el.dataset.cat; render(); }));

            // Buy buttons
            document.querySelectorAll('[data-buy]').forEach(el => el.addEventListener('click', () => {
                const id = el.dataset.buy, price = parseInt(el.dataset.price);
                if (STATE.coins < price) { showNotif('No tienes suficientes monedas CC.', 'error'); return; }
                STATE.coins -= price;
                nui('buyProduct', { productId: id });
                showNotif('¡Comprando...', 'success');
            }));

            // Toggle business
            document.querySelectorAll('[data-toggle-biz]').forEach(el => el.addEventListener('click', () => {
                const id = parseInt(el.dataset.toggleBiz);
                const b = STATE.businesses.find(x => x.id === id);
                if (b) { b.status = b.status ? 0 : 1; nui('toggleBusiness', { bizId: id }); render(); }
            }));

            // Delete news (admin)
            document.querySelectorAll('[data-del-ann]').forEach(el => el.addEventListener('click', () => {
                const id = parseInt(el.dataset.delAnn);
                if (confirm('¿Eliminar anuncio?')) { STATE.announcements = STATE.announcements.filter(a => a.id !== id); nui('deleteAnnouncement', { annId: id }); render(); }
            }));

            // Delete product (admin)
            document.querySelectorAll('[data-del-prod]').forEach(el => el.addEventListener('click', () => {
                const id = parseInt(el.dataset.delProd);
                if (confirm('¿Eliminar producto?')) { STATE.products = STATE.products.filter(p => p.id !== id); nui('deleteProduct', { productId: id }); render(); }
            }));

            // Delete category (admin)
            document.querySelectorAll('[data-del-cat]').forEach(el => el.addEventListener('click', () => {
                const id = parseInt(el.dataset.delCat);
                if (confirm('¿Eliminar categoría?')) { STATE.categories = STATE.categories.filter(c => c.id !== id); nui('deleteCategory', { catId: id }); render(); }
            }));

            // Admin tabs
            document.querySelectorAll('[data-admin-tab]').forEach(el => el.addEventListener('click', () => { STATE.adminTab = el.dataset.adminTab; render(); }));

            // Admin: Create Product
            const pf = document.getElementById('prod-form');
            if (pf) pf.addEventListener('submit', e => {
                e.preventDefault();
                const fd = new FormData(pf);
                const data = { name: fd.get('name'), description: fd.get('description'), price: parseInt(fd.get('price')), item: fd.get('item'), image: fd.get('image'), category: fd.get('category') };
                nui('createProduct', data);
                STATE.prodForm = { name: '', description: '', price: '', item: '', image: '', category: '' };
                showNotif('Producto creado', 'success');
                render();
            });

            // Admin: Create Announcement
            const af = document.getElementById('ann-form');
            if (af) af.addEventListener('submit', e => {
                e.preventDefault();
                const fd = new FormData(af);
                const data = { title: fd.get('title'), content: fd.get('content'), category: fd.get('category') };
                STATE.announcements.unshift({ id: Date.now(), date: new Date().toISOString(), ...data });
                nui('createAnnouncement', data);
                STATE.annForm = { title: '', content: '', category: 'Update' };
                showNotif('Anuncio publicado', 'success');
                render();
            });

            // Admin: Create Category
            const cf = document.getElementById('cat-form');
            if (cf) cf.addEventListener('submit', e => {
                e.preventDefault();
                const fd = new FormData(cf);
                const data = { name: fd.get('name'), icon: fd.get('icon') || 'package' };
                STATE.categories.push({ id: Date.now(), ...data });
                nui('createCategory', data);
                STATE.catForm = { name: '', icon: 'Package' };
                showNotif('Categoría creada', 'success');
                render();
            });

            // Admin: Coins
            const bgc = document.getElementById('btn-give-coins');
            const brc = document.getElementById('btn-remove-coins');
            if (bgc) bgc.addEventListener('click', () => {
                const tid = document.getElementById('coins-target')?.value;
                const amt = document.getElementById('coins-amount')?.value;
                if (!tid || !amt) { showNotif('Rellena todos los campos', 'error'); return; }
                nui('manageCoins', { targetId: tid, amount: parseInt(amt), action: 'add' });
                showNotif('Monedas dadas correctamente', 'success');
                STATE.coinsForm = { targetId: '', amount: '', action: 'add' };
                render();
            });
            if (brc) brc.addEventListener('click', () => {
                const tid = document.getElementById('coins-target')?.value;
                const amt = document.getElementById('coins-amount')?.value;
                if (!tid || !amt) { showNotif('Rellena todos los campos', 'error'); return; }
                nui('manageCoins', { targetId: tid, amount: parseInt(amt), action: 'remove' });
                showNotif('Monedas quitadas', 'success');
                STATE.coinsForm = { targetId: '', amount: '', action: 'remove' };
                render();
            });
        }

        // ===== MESSAGE LISTENER =====
        window.addEventListener('message', e => {
            const d = e.data;
            if (d.action === 'OPEN') {
                STATE.visible = true;
                STATE.tab = 'home';
                Object.assign(STATE, d.data);
                document.body.style.display = 'block';
                render();
            }
            if (d.action === 'CLOSE') {
                STATE.visible = false;
                document.body.style.display = 'none';
                render();
            }
            if (d.action === 'NOTIFY') {
                showNotif(d.message, d.ntype || 'success');
            }
            if (d.action === 'UPDATE_COINS') {
                STATE.coins = d.coins;
                const el = document.getElementById('coins-display');
                if (el) el.textContent = d.coins;
            }
        });

        // Escape key
        window.addEventListener('keydown', e => {
            if (e.key === 'Escape' && STATE.visible) {
                nui('close');
                STATE.visible = false;
                document.body.style.display = 'none';
                render();
            }
        });

        // Initial render
        render();
    </script>
</body>

</html>
